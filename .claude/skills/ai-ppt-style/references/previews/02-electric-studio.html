<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>风格预览 — Electric Studio</title>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;800&family=Noto+Sans+SC:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-primary: #0a0a0a;
      --bg-secondary: #ffffff;
      --text-primary: #ffffff;
      --text-secondary: #888888;
      --text-dark: #0a0a0a;
      --accent: #4361ee;
      --accent-glow: rgba(67, 97, 238, 0.3);

      --font-display: "Manrope", "Noto Sans SC", sans-serif;
      --font-body: "Manrope", "Noto Sans SC", sans-serif;

      --title-size: clamp(1.5rem, 5vw, 4rem);
      --h2-size: clamp(1.25rem, 3.5vw, 2.5rem);
      --h3-size: clamp(1rem, 2.5vw, 1.75rem);
      --body-size: clamp(0.75rem, 1.5vw, 1.125rem);
      --small-size: clamp(0.65rem, 1vw, 0.875rem);

      --slide-padding: clamp(1rem, 4vw, 4rem);
      --content-gap: clamp(0.5rem, 2vw, 2rem);

      --ease-out-expo: cubic-bezier(0.16, 1, 0.3, 1);
      --duration-normal: 0.25s;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; overflow-x: hidden; }
    html { scroll-snap-type: y mandatory; scroll-behavior: smooth; }

    body {
      background-color: var(--bg-primary);
      color: var(--text-primary);
      font-family: var(--font-body);
      font-size: var(--body-size);
      line-height: 1.8;
      letter-spacing: 0.05em;
    }

    .slide {
      width: 100vw; height: 100vh; height: 100dvh;
      overflow: hidden; scroll-snap-align: start;
      display: flex; flex-direction: column; position: relative;
    }

    /* Professional: fast, subtle animations */
    .reveal {
      opacity: 0; transform: translateY(15px);
      transition: opacity var(--duration-normal) ease,
                  transform var(--duration-normal) ease;
    }
    .slide.visible .reveal { opacity: 1; transform: translateY(0); }
    .reveal:nth-child(1) { transition-delay: 0.05s; }
    .reveal:nth-child(2) { transition-delay: 0.1s; }
    .reveal:nth-child(3) { transition-delay: 0.15s; }
    .reveal:nth-child(4) { transition-delay: 0.2s; }

    .slide-content {
      flex: 1; display: flex; flex-direction: column;
      justify-content: center; align-items: center; text-align: center;
      max-height: 100%; overflow: hidden; padding: var(--slide-padding);
    }
    .slide-content.left-align { align-items: flex-start; text-align: left; }

    h1 { font-family: var(--font-display); font-size: var(--title-size); font-weight: 800; letter-spacing: 0.08em; line-height: 1.3; }
    h2 { font-family: var(--font-display); font-size: var(--h2-size); font-weight: 800; letter-spacing: 0.08em; margin-bottom: var(--content-gap); }
    h3 { font-family: var(--font-display); font-size: var(--h3-size); font-weight: 800; }
    p  { font-size: var(--body-size); color: var(--text-secondary); line-height: 1.8; max-width: 800px; }
    em { font-style: normal; font-weight: 700; color: var(--accent); }

    .big-number {
      font-family: var(--font-display); font-size: clamp(4rem, 15vw, 10rem);
      font-weight: 800; color: var(--accent); line-height: 1;
    }

    blockquote {
      font-size: var(--h3-size); font-style: normal;
      border-left: 4px solid var(--accent);
      padding: 0.5em 1em; text-align: left; max-width: 800px; line-height: 1.8;
    }
    .attribution { text-align: right; opacity: 0.6; font-size: var(--small-size); margin-top: 1em; }

    .two-cols { display: flex; gap: clamp(1rem, 3vw, 3rem); width: 100%; max-width: 1000px; }
    .two-cols > div { flex: 1; text-align: left; }

    ul { text-align: left; max-width: 800px; list-style: none; }
    ul li { padding: 0.3em 0; }
    ul li::before { content: "—"; color: var(--accent); margin-right: 0.5em; }

    /* ===== Layout Signature: Split-panel ===== */
    .split-slide {
      display: grid; grid-template-rows: 1fr 1fr; height: 100%;
    }
    .split-top {
      background: #ffffff; color: #0a0a0a;
      display: flex; flex-direction: column; justify-content: flex-end;
      padding: var(--slide-padding); padding-bottom: clamp(1rem, 2vw, 2rem);
    }
    .split-bottom {
      background: var(--accent); color: #ffffff;
      display: flex; flex-direction: column; justify-content: flex-start;
      padding: var(--slide-padding); padding-top: clamp(1rem, 2vw, 2rem);
    }
    .split-top h1, .split-top h2, .split-top h3 { color: #0a0a0a; }
    .split-top p { color: #555; }
    .split-bottom p { color: rgba(255,255,255,0.8); }
    .accent-bar {
      width: 60px; height: 4px; background: var(--accent); margin-bottom: 1rem;
    }

    .progress-bar {
      position: fixed; top: 0; left: 0; height: 4px;
      background: linear-gradient(90deg, var(--accent), var(--accent-glow));
      width: 0%; z-index: 1000; transition: width 0.3s ease;
    }

    .preview-badge {
      position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%);
      background: var(--accent); color: #ffffff;
      padding: 0.4rem 1.2rem; border-radius: 2rem;
      font-size: var(--small-size); font-weight: 600; z-index: 1000;
      opacity: 0.85; pointer-events: none;
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.2s !important; }
      html { scroll-behavior: auto; }
    }
  </style>
</head>
<body>

  <div class="progress-bar"></div>
  <div class="preview-badge">Electric Studio · 风格预览</div>

  <!-- Slide 1: Cover — split panel -->
  <section class="slide">
    <div class="split-slide">
      <div class="split-top">
        <h1 class="reveal">演示文稿标题</h1>
      </div>
      <div class="split-bottom">
        <p class="reveal" style="font-size: var(--h3-size); color: #fff;">Bold · Clean · Professional — 高对比专业风格</p>
      </div>
    </div>
  </section>

  <!-- Slide 2: Stat -->
  <section class="slide" style="background: #0a0a0a;">
    <div class="slide-content">
      <div class="big-number reveal">42%</div>
      <p class="reveal" style="font-size: var(--h3-size);">关键数据展示效果</p>
      <p class="reveal" style="font-size: var(--small-size); opacity: 0.5;">Data Visualization Sample</p>
    </div>
  </section>

  <!-- Slide 3: Content — white background -->
  <section class="slide" style="background: #ffffff; color: #0a0a0a;">
    <div class="slide-content left-align">
      <div class="accent-bar reveal"></div>
      <h2 class="reveal" style="color: #0a0a0a;">内容排版预览</h2>
      <ul style="color: #0a0a0a;">
        <li class="reveal" style="color: #0a0a0a;">第一个要点 — 展示<em>强调色</em>效果</li>
        <li class="reveal" style="color: #0a0a0a;">第二个要点 — 展示正文字体和行间距</li>
        <li class="reveal" style="color: #0a0a0a;">第三个要点 — 展示列表项的前缀装饰</li>
      </ul>
    </div>
  </section>

  <!-- Slide 4: Quote — on accent bg -->
  <section class="slide" style="background: var(--accent);">
    <div class="slide-content">
      <blockquote class="reveal" style="color: #fff; border-left-color: #fff;">"好的设计是尽可能少的设计。"</blockquote>
      <p class="attribution reveal" style="color: rgba(255,255,255,0.7);">— Dieter Rams</p>
    </div>
  </section>

  <!-- Slide 5: Two-Column split -->
  <section class="slide">
    <div class="split-slide">
      <div class="split-top" style="justify-content: center;">
        <h2 class="reveal" style="color: #0a0a0a;">方案 A</h2>
        <ul>
          <li class="reveal" style="color: #333;">优势一</li>
          <li class="reveal" style="color: #333;">优势二</li>
        </ul>
      </div>
      <div class="split-bottom" style="justify-content: center;">
        <h2 class="reveal" style="color: #fff;">方案 B</h2>
        <ul>
          <li class="reveal" style="color: rgba(255,255,255,0.8);">优势一</li>
          <li class="reveal" style="color: rgba(255,255,255,0.8);">优势二</li>
        </ul>
      </div>
    </div>
  </section>

  <script>
    const slides = document.querySelectorAll('.slide');
    let current = 0;
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          entry.target.classList.add('visible');
          current = Array.from(slides).indexOf(entry.target);
          document.querySelector('.progress-bar').style.width = ((current + 1) / slides.length * 100) + '%';
        }
      });
    }, { threshold: 0.5 });
    slides.forEach(s => observer.observe(s));
    let lastScroll = 0;
    const go = (dir) => { current = Math.max(0, Math.min(slides.length - 1, current + dir)); slides[current].scrollIntoView({ behavior: 'smooth' }); };
    document.addEventListener('keydown', (e) => {
      if (['ArrowRight', ' ', 'PageDown'].includes(e.key)) { e.preventDefault(); go(1); }
      if (['ArrowLeft', 'PageUp'].includes(e.key)) { e.preventDefault(); go(-1); }
    });
    document.addEventListener('wheel', (e) => { e.preventDefault(); const now = Date.now(); if (now - lastScroll < 800) return; lastScroll = now; go(e.deltaY > 0 ? 1 : -1); }, { passive: false });
  </script>
</body>
</html>
