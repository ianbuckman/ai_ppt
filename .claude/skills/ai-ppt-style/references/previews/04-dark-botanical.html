<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>风格预览 — Dark Botanical</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant:wght@400;600&family=IBM+Plex+Sans:wght@300;400&family=Noto+Serif+SC:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-primary: #0f0f0f;
      --bg-secondary: #1a1a1a;
      --text-primary: #e8e4df;
      --text-secondary: #9a9590;
      --accent: #d4a574;
      --accent-glow: rgba(212, 165, 116, 0.3);
      --accent-pink: #e8b4b8;
      --accent-gold: #c9b896;

      --font-display: "Cormorant", "Noto Serif SC", serif;
      --font-body: "IBM Plex Sans", "Noto Sans SC", sans-serif;

      --title-size: clamp(1.8rem, 5.5vw, 4.5rem);
      --h2-size: clamp(1.4rem, 4vw, 3rem);
      --h3-size: clamp(1rem, 2.5vw, 1.75rem);
      --body-size: clamp(0.75rem, 1.5vw, 1.125rem);
      --small-size: clamp(0.65rem, 1vw, 0.875rem);

      --slide-padding: clamp(1.5rem, 5vw, 5rem);
      --content-gap: clamp(0.5rem, 2vw, 2rem);

      --ease-out-expo: cubic-bezier(0.16, 1, 0.3, 1);
      --duration-normal: 1.2s;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; overflow-x: hidden; }
    html { scroll-snap-type: y mandatory; scroll-behavior: smooth; }

    body {
      background-color: var(--bg-primary);
      color: var(--text-primary);
      font-family: var(--font-body);
      font-size: var(--body-size);
      line-height: 1.8;
      letter-spacing: 0.05em;
      font-weight: 300;
    }

    .slide {
      width: 100vw; height: 100vh; height: 100dvh;
      overflow: hidden; scroll-snap-align: start;
      display: flex; flex-direction: column; position: relative;
    }

    .slide-content {
      flex: 1; display: flex; flex-direction: column;
      justify-content: center; align-items: center; text-align: center;
      max-height: 100%; overflow: hidden; padding: var(--slide-padding);
      position: relative; z-index: 1;
    }
    .slide-content.left-align { align-items: flex-start; text-align: left; }

    h1 { font-family: var(--font-display); font-size: var(--title-size); font-weight: 400; letter-spacing: 0.08em; line-height: 1.3; }
    h2 { font-family: var(--font-display); font-size: var(--h2-size); font-weight: 400; letter-spacing: 0.08em; margin-bottom: var(--content-gap); }
    h3 { font-family: var(--font-display); font-size: var(--h3-size); font-weight: 600; }
    p  { font-size: var(--body-size); color: var(--text-secondary); line-height: 1.8; max-width: 800px; }
    em { font-style: normal; font-weight: 700; color: var(--accent); }

    /* Dramatic: slow, grand entrance */
    .reveal {
      opacity: 0; transform: translateY(40px) scale(0.95);
      transition: opacity var(--duration-normal) var(--ease-out-expo),
                  transform var(--duration-normal) var(--ease-out-expo);
    }
    .slide.visible .reveal { opacity: 1; transform: translateY(0) scale(1); }
    .reveal:nth-child(1) { transition-delay: 0.15s; }
    .reveal:nth-child(2) { transition-delay: 0.35s; }
    .reveal:nth-child(3) { transition-delay: 0.55s; }
    .reveal:nth-child(4) { transition-delay: 0.75s; }

    .big-number {
      font-family: var(--font-display); font-size: clamp(4rem, 15vw, 10rem);
      font-weight: 400; color: var(--accent); line-height: 1;
    }

    blockquote {
      font-family: var(--font-display);
      font-size: var(--h2-size); font-style: normal;
      border-left: 2px solid var(--accent-gold);
      padding: 0.5em 1.5em; text-align: left; max-width: 800px; line-height: 1.6;
    }
    .attribution { text-align: right; opacity: 0.6; font-size: var(--small-size); margin-top: 1em; font-family: var(--font-body); }

    .two-cols { display: flex; gap: clamp(1rem, 3vw, 3rem); width: 100%; max-width: 1000px; }
    .two-cols > div { flex: 1; text-align: left; }

    ul { text-align: left; max-width: 800px; list-style: none; }
    ul li { padding: 0.4em 0; font-weight: 300; }
    ul li::before { content: "·"; color: var(--accent); margin-right: 0.8em; font-size: 1.2em; }

    /* ===== Layout Signature: Gradient circles + accent lines ===== */
    .botanical-deco {
      position: absolute; border-radius: 50%; filter: blur(80px); opacity: 0.15; pointer-events: none;
    }
    .deco-1 { width: 300px; height: 300px; background: var(--accent); top: -80px; right: -60px; }
    .deco-2 { width: 200px; height: 200px; background: var(--accent-pink); bottom: -40px; left: -40px; }
    .deco-3 { width: 250px; height: 250px; background: var(--accent-gold); top: 50%; left: -80px; }

    .accent-line {
      width: 2px; height: 60px; background: linear-gradient(to bottom, var(--accent), transparent);
      margin: 0 auto 1.5rem;
    }

    .progress-bar {
      position: fixed; top: 0; left: 0; height: 2px;
      background: linear-gradient(90deg, var(--accent), var(--accent-gold));
      width: 0%; z-index: 1000; transition: width 0.3s ease;
    }

    .preview-badge {
      position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%);
      background: var(--accent); color: var(--bg-primary);
      padding: 0.4rem 1.2rem; border-radius: 2rem;
      font-size: var(--small-size); font-weight: 600; z-index: 1000;
      opacity: 0.85; pointer-events: none; font-family: var(--font-body);
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.2s !important; }
      html { scroll-behavior: auto; }
    }
  </style>
</head>
<body>

  <div class="progress-bar"></div>
  <div class="preview-badge">Dark Botanical · 风格预览</div>

  <!-- Slide 1: Cover -->
  <section class="slide">
    <div class="botanical-deco deco-1"></div>
    <div class="botanical-deco deco-2"></div>
    <div class="slide-content">
      <div class="accent-line reveal"></div>
      <h1 class="reveal">演示文稿标题</h1>
      <p class="reveal" style="margin-top: 1em;">Elegant · Sophisticated · Premium — 优雅高级的视觉风格</p>
    </div>
  </section>

  <!-- Slide 2: Stat -->
  <section class="slide">
    <div class="botanical-deco deco-3"></div>
    <div class="slide-content">
      <div class="big-number reveal">42%</div>
      <p class="reveal" style="font-size: var(--h3-size); color: var(--accent-gold);">关键数据展示效果</p>
    </div>
  </section>

  <!-- Slide 3: Content list -->
  <section class="slide">
    <div class="botanical-deco deco-1" style="top: auto; bottom: -60px; right: auto; left: 60%;"></div>
    <div class="slide-content left-align">
      <h2 class="reveal" style="color: var(--accent);">内容排版预览</h2>
      <ul>
        <li class="reveal">第一个要点 — 展示<em>强调色</em>效果</li>
        <li class="reveal">第二个要点 — 展示正文字体和行间距</li>
        <li class="reveal">第三个要点 — 展示列表项的前缀装饰</li>
      </ul>
    </div>
  </section>

  <!-- Slide 4: Quote -->
  <section class="slide">
    <div class="botanical-deco deco-2" style="bottom: auto; top: 20%; left: auto; right: -40px;"></div>
    <div class="slide-content">
      <blockquote class="reveal">"好的设计是尽可能少的设计。"</blockquote>
      <p class="attribution reveal">— Dieter Rams</p>
    </div>
  </section>

  <!-- Slide 5: Two-Column -->
  <section class="slide">
    <div class="slide-content">
      <h2 class="reveal" style="color: var(--accent-gold);">对比布局预览</h2>
      <div class="two-cols reveal">
        <div style="border-right: 1px solid rgba(201,184,150,0.2); padding-right: 2rem;">
          <h3 style="color: var(--accent);">方案 A</h3>
          <ul><li>优势一</li><li>优势二</li></ul>
        </div>
        <div style="padding-left: 2rem;">
          <h3 style="color: var(--accent-pink);">方案 B</h3>
          <ul><li>优势一</li><li>优势二</li></ul>
        </div>
      </div>
    </div>
  </section>

  <script>
    const slides = document.querySelectorAll('.slide');
    let current = 0;
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          entry.target.classList.add('visible');
          current = Array.from(slides).indexOf(entry.target);
          document.querySelector('.progress-bar').style.width = ((current + 1) / slides.length * 100) + '%';
        }
      });
    }, { threshold: 0.5 });
    slides.forEach(s => observer.observe(s));
    let lastScroll = 0;
    const go = (dir) => { current = Math.max(0, Math.min(slides.length - 1, current + dir)); slides[current].scrollIntoView({ behavior: 'smooth' }); };
    document.addEventListener('keydown', (e) => {
      if (['ArrowRight', ' ', 'PageDown'].includes(e.key)) { e.preventDefault(); go(1); }
      if (['ArrowLeft', 'PageUp'].includes(e.key)) { e.preventDefault(); go(-1); }
    });
    document.addEventListener('wheel', (e) => { e.preventDefault(); const now = Date.now(); if (now - lastScroll < 800) return; lastScroll = now; go(e.deltaY > 0 ? 1 : -1); }, { passive: false });
  </script>
</body>
</html>
