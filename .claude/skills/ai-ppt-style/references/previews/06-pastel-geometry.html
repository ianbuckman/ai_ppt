<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>风格预览 — Pastel Geometry</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;700;800&family=Noto+Sans+SC:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-primary: #c8d9e6;
      --bg-secondary: #b0c8d8;
      --card-bg: #faf9f7;
      --text-primary: #1a1a1a;
      --text-secondary: #555555;
      --accent: #7c6aad;
      --accent-glow: rgba(124, 106, 173, 0.3);
      --pill-pink: #f0b4d4;
      --pill-mint: #a8d4c4;
      --pill-sage: #5a7c6a;
      --pill-lavender: #9b8dc4;

      --font-display: "Plus Jakarta Sans", "Noto Sans SC", sans-serif;
      --font-body: "Plus Jakarta Sans", "Noto Sans SC", sans-serif;

      --title-size: clamp(1.5rem, 5vw, 4rem);
      --h2-size: clamp(1.25rem, 3.5vw, 2.5rem);
      --h3-size: clamp(1rem, 2.5vw, 1.75rem);
      --body-size: clamp(0.75rem, 1.5vw, 1.125rem);
      --small-size: clamp(0.65rem, 1vw, 0.875rem);

      --slide-padding: clamp(1rem, 4vw, 4rem);
      --content-gap: clamp(0.5rem, 2vw, 2rem);

      --ease-out-back: cubic-bezier(0.34, 1.56, 0.64, 1);
      --ease-out-expo: cubic-bezier(0.16, 1, 0.3, 1);
      --duration-normal: 0.6s;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; overflow-x: hidden; }
    html { scroll-snap-type: y mandatory; scroll-behavior: smooth; }

    body {
      background-color: var(--bg-primary);
      color: var(--text-primary);
      font-family: var(--font-body);
      font-size: var(--body-size);
      line-height: 1.8;
      letter-spacing: 0.05em;
    }

    .slide {
      width: 100vw; height: 100vh; height: 100dvh;
      overflow: hidden; scroll-snap-align: start;
      display: flex; justify-content: center; align-items: center;
      position: relative; padding: clamp(1rem, 3vw, 3rem);
    }

    /* ===== Layout Signature: White rounded card on pastel bg + pills ===== */
    .card {
      background: var(--card-bg);
      border-radius: 20px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      width: 100%; max-width: 900px; height: 85%;
      display: flex; flex-direction: column;
      justify-content: center; align-items: center; text-align: center;
      padding: var(--slide-padding);
      position: relative; overflow: hidden;
    }
    .card.left-align { align-items: flex-start; text-align: left; }

    /* Colored pills on right edge */
    .pill-strip {
      position: absolute; right: -6px; top: 50%; transform: translateY(-50%);
      display: flex; flex-direction: column; gap: 8px; align-items: flex-end;
    }
    .pill { border-radius: 12px 0 0 12px; width: 12px; }
    .pill-short { height: 30px; }
    .pill-med { height: 50px; }
    .pill-tall { height: 70px; }

    h1 { font-family: var(--font-display); font-size: var(--title-size); font-weight: 800; letter-spacing: 0.05em; line-height: 1.3; }
    h2 { font-family: var(--font-display); font-size: var(--h2-size); font-weight: 700; letter-spacing: 0.05em; margin-bottom: var(--content-gap); }
    h3 { font-family: var(--font-display); font-size: var(--h3-size); font-weight: 700; }
    p  { font-size: var(--body-size); color: var(--text-secondary); line-height: 1.8; max-width: 700px; }
    em { font-style: normal; font-weight: 700; color: var(--accent); }

    /* Playful: bouncy entrance */
    .reveal {
      opacity: 0; transform: translateY(40px) scale(0.8);
      transition: opacity var(--duration-normal) var(--ease-out-back),
                  transform var(--duration-normal) var(--ease-out-back);
    }
    .slide.visible .reveal { opacity: 1; transform: translateY(0) scale(1); }
    .reveal:nth-child(1) { transition-delay: 0.1s; }
    .reveal:nth-child(2) { transition-delay: 0.2s; }
    .reveal:nth-child(3) { transition-delay: 0.3s; }
    .reveal:nth-child(4) { transition-delay: 0.4s; }

    .big-number {
      font-family: var(--font-display); font-size: clamp(4rem, 15vw, 10rem);
      font-weight: 800; color: var(--accent); line-height: 1;
    }

    blockquote {
      font-size: var(--h3-size); font-style: normal;
      border-left: 4px solid var(--pill-pink);
      padding: 0.5em 1em; text-align: left; max-width: 700px; line-height: 1.8;
      color: var(--text-primary);
    }
    .attribution { text-align: right; opacity: 0.6; font-size: var(--small-size); margin-top: 1em; }

    .two-cols { display: flex; gap: clamp(1rem, 3vw, 3rem); width: 100%; max-width: 800px; }
    .two-cols > div { flex: 1; text-align: left; }

    ul { text-align: left; max-width: 700px; list-style: none; }
    ul li { padding: 0.3em 0; }
    ul li::before { content: "●"; color: var(--pill-mint); margin-right: 0.5em; font-size: 0.6em; vertical-align: middle; }

    .progress-bar {
      position: fixed; top: 0; left: 0; height: 4px;
      background: linear-gradient(90deg, var(--pill-pink), var(--pill-lavender), var(--pill-mint));
      width: 0%; z-index: 1000; transition: width 0.3s ease;
    }

    .preview-badge {
      position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%);
      background: var(--accent); color: #fff;
      padding: 0.4rem 1.2rem; border-radius: 2rem;
      font-size: var(--small-size); font-weight: 600; z-index: 1000;
      opacity: 0.85; pointer-events: none;
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.2s !important; }
      html { scroll-behavior: auto; }
    }
  </style>
</head>
<body>

  <div class="progress-bar"></div>
  <div class="preview-badge">Pastel Geometry · 风格预览</div>

  <section class="slide">
    <div class="card">
      <div class="pill-strip">
        <div class="pill pill-short" style="background: var(--pill-pink);"></div>
        <div class="pill pill-med" style="background: var(--pill-mint);"></div>
        <div class="pill pill-tall" style="background: var(--pill-lavender);"></div>
        <div class="pill pill-med" style="background: var(--pill-sage);"></div>
      </div>
      <h1 class="reveal">演示文稿标题</h1>
      <p class="reveal" style="margin-top: 1em;">Friendly · Modern · Approachable — 友好现代的视觉风格</p>
    </div>
  </section>

  <section class="slide">
    <div class="card">
      <div class="pill-strip">
        <div class="pill pill-short" style="background: var(--pill-pink);"></div>
        <div class="pill pill-tall" style="background: var(--pill-mint);"></div>
        <div class="pill pill-med" style="background: var(--pill-lavender);"></div>
      </div>
      <div class="big-number reveal">42%</div>
      <p class="reveal" style="font-size: var(--h3-size);">关键数据展示效果</p>
    </div>
  </section>

  <section class="slide">
    <div class="card left-align">
      <div class="pill-strip">
        <div class="pill pill-med" style="background: var(--pill-pink);"></div>
        <div class="pill pill-short" style="background: var(--pill-mint);"></div>
        <div class="pill pill-tall" style="background: var(--pill-lavender);"></div>
      </div>
      <h2 class="reveal">内容排版预览</h2>
      <ul>
        <li class="reveal">第一个要点 — 展示<em>强调色</em>效果</li>
        <li class="reveal">第二个要点 — 展示正文字体和行间距</li>
        <li class="reveal">第三个要点 — 展示列表项的前缀装饰</li>
      </ul>
    </div>
  </section>

  <section class="slide">
    <div class="card">
      <div class="pill-strip">
        <div class="pill pill-tall" style="background: var(--pill-pink);"></div>
        <div class="pill pill-med" style="background: var(--pill-mint);"></div>
      </div>
      <blockquote class="reveal">"好的设计是尽可能少的设计。"</blockquote>
      <p class="attribution reveal">— Dieter Rams</p>
    </div>
  </section>

  <section class="slide">
    <div class="card">
      <div class="pill-strip">
        <div class="pill pill-short" style="background: var(--pill-pink);"></div>
        <div class="pill pill-med" style="background: var(--pill-mint);"></div>
        <div class="pill pill-short" style="background: var(--pill-lavender);"></div>
      </div>
      <h2 class="reveal">对比布局预览</h2>
      <div class="two-cols reveal">
        <div>
          <h3 style="color: var(--pill-sage);">方案 A</h3>
          <ul><li>优势一</li><li>优势二</li></ul>
        </div>
        <div>
          <h3 style="color: var(--accent);">方案 B</h3>
          <ul><li>优势一</li><li>优势二</li></ul>
        </div>
      </div>
    </div>
  </section>

  <script>
    const slides = document.querySelectorAll('.slide');
    let current = 0;
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          entry.target.classList.add('visible');
          current = Array.from(slides).indexOf(entry.target);
          document.querySelector('.progress-bar').style.width = ((current + 1) / slides.length * 100) + '%';
        }
      });
    }, { threshold: 0.5 });
    slides.forEach(s => observer.observe(s));
    let lastScroll = 0;
    const go = (dir) => { current = Math.max(0, Math.min(slides.length - 1, current + dir)); slides[current].scrollIntoView({ behavior: 'smooth' }); };
    document.addEventListener('keydown', (e) => {
      if (['ArrowRight', ' ', 'PageDown'].includes(e.key)) { e.preventDefault(); go(1); }
      if (['ArrowLeft', 'PageUp'].includes(e.key)) { e.preventDefault(); go(-1); }
    });
    document.addEventListener('wheel', (e) => { e.preventDefault(); const now = Date.now(); if (now - lastScroll < 800) return; lastScroll = now; go(e.deltaY > 0 ? 1 : -1); }, { passive: false });
  </script>
</body>
</html>
