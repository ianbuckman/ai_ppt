<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>风格预览 — Terminal Green</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Noto+Sans+SC:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-primary: #0d1117;
      --bg-secondary: #161b22;
      --text-primary: #c9d1d9;
      --text-secondary: #8b949e;
      --accent: #39d353;
      --accent-glow: rgba(57, 211, 83, 0.3);

      --font-display: "JetBrains Mono", "Noto Sans SC", monospace;
      --font-body: "JetBrains Mono", "Noto Sans SC", monospace;

      --title-size: clamp(1.3rem, 4vw, 3rem);
      --h2-size: clamp(1.1rem, 3vw, 2rem);
      --h3-size: clamp(0.9rem, 2vw, 1.5rem);
      --body-size: clamp(0.7rem, 1.3vw, 1rem);
      --small-size: clamp(0.6rem, 0.9vw, 0.8rem);

      --slide-padding: clamp(1rem, 4vw, 4rem);
      --content-gap: clamp(0.5rem, 2vw, 2rem);

      --ease-out-expo: cubic-bezier(0.16, 1, 0.3, 1);
      --duration-normal: 0.5s;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; overflow-x: hidden; }
    html { scroll-snap-type: y mandatory; scroll-behavior: smooth; }

    body {
      background-color: var(--bg-primary);
      color: var(--text-primary);
      font-family: var(--font-body);
      font-size: var(--body-size);
      line-height: 1.8;
      letter-spacing: 0.05em;
    }

    .slide {
      width: 100vw; height: 100vh; height: 100dvh;
      overflow: hidden; scroll-snap-align: start;
      display: flex; flex-direction: column; position: relative;
    }

    .slide-content {
      flex: 1; display: flex; flex-direction: column;
      justify-content: center; align-items: center; text-align: center;
      max-height: 100%; overflow: hidden; padding: var(--slide-padding);
      position: relative; z-index: 1;
    }
    .slide-content.left-align { align-items: flex-start; text-align: left; }

    h1 { font-family: var(--font-display); font-size: var(--title-size); font-weight: 700; letter-spacing: 0.08em; line-height: 1.3; color: var(--accent); }
    h2 { font-family: var(--font-display); font-size: var(--h2-size); font-weight: 700; letter-spacing: 0.08em; margin-bottom: var(--content-gap); color: var(--accent); }
    h3 { font-family: var(--font-display); font-size: var(--h3-size); font-weight: 700; }
    p  { font-size: var(--body-size); color: var(--text-secondary); line-height: 1.8; max-width: 800px; }
    em { font-style: normal; font-weight: 700; color: var(--accent); }

    .reveal {
      opacity: 0; transform: translateY(20px);
      transition: opacity var(--duration-normal) var(--ease-out-expo),
                  transform var(--duration-normal) var(--ease-out-expo);
    }
    .slide.visible .reveal { opacity: 1; transform: translateY(0); }
    .reveal:nth-child(1) { transition-delay: 0.1s; }
    .reveal:nth-child(2) { transition-delay: 0.2s; }
    .reveal:nth-child(3) { transition-delay: 0.3s; }
    .reveal:nth-child(4) { transition-delay: 0.4s; }

    /* ===== Layout Signature: Terminal window + scanlines + cursor ===== */
    .terminal-window {
      background: var(--bg-secondary);
      border: 1px solid #30363d;
      border-radius: 8px;
      width: 100%; max-width: 800px;
      overflow: hidden;
    }
    .terminal-titlebar {
      background: #1c2128; padding: 8px 12px;
      display: flex; gap: 6px; align-items: center;
      border-bottom: 1px solid #30363d;
    }
    .terminal-dot { width: 10px; height: 10px; border-radius: 50%; }
    .terminal-body { padding: 1.5rem; text-align: left; }

    .prompt::before { content: "$ "; color: var(--accent); }

    /* Scanline overlay */
    .scanlines::after {
      content: ''; position: absolute; inset: 0; pointer-events: none;
      background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.08) 2px, rgba(0,0,0,0.08) 4px);
    }

    /* Blinking cursor */
    @keyframes blink { 0%, 50% { opacity: 1; } 51%, 100% { opacity: 0; } }
    .cursor { display: inline-block; width: 8px; height: 1.1em; background: var(--accent); animation: blink 1s step-end infinite; vertical-align: text-bottom; margin-left: 2px; }

    .big-number {
      font-family: var(--font-display); font-size: clamp(4rem, 15vw, 10rem);
      font-weight: 700; color: var(--accent); line-height: 1;
    }

    blockquote {
      font-size: var(--h3-size); font-style: normal;
      border-left: 3px solid var(--accent);
      padding: 0.5em 1em; text-align: left; max-width: 800px; line-height: 1.8;
    }
    .attribution { text-align: right; opacity: 0.6; font-size: var(--small-size); margin-top: 1em; }

    .two-cols { display: flex; gap: clamp(1rem, 3vw, 3rem); width: 100%; max-width: 900px; }
    .two-cols > div { flex: 1; text-align: left; }

    ul { text-align: left; max-width: 800px; list-style: none; }
    ul li { padding: 0.3em 0; }
    ul li::before { content: "→"; color: var(--accent); margin-right: 0.5em; }

    .progress-bar {
      position: fixed; top: 0; left: 0; height: 3px;
      background: var(--accent);
      width: 0%; z-index: 1000; transition: width 0.3s ease;
      box-shadow: 0 0 8px var(--accent-glow);
    }

    .preview-badge {
      position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%);
      background: var(--accent); color: var(--bg-primary);
      padding: 0.4rem 1.2rem; border-radius: 2rem;
      font-size: var(--small-size); font-weight: 700; z-index: 1000;
      opacity: 0.85; pointer-events: none;
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.2s !important; }
      html { scroll-behavior: auto; }
    }
  </style>
</head>
<body>

  <div class="progress-bar"></div>
  <div class="preview-badge">Terminal Green · 风格预览</div>

  <!-- Slide 1: Cover -->
  <section class="slide scanlines">
    <div class="slide-content">
      <h1 class="reveal">$ 演示文稿标题<span class="cursor"></span></h1>
      <p class="reveal" style="margin-top: 1em;">Developer · Hacker · CLI — 终端绿风格</p>
    </div>
  </section>

  <!-- Slide 2: Stat in terminal -->
  <section class="slide scanlines">
    <div class="slide-content">
      <div class="big-number reveal">42%</div>
      <p class="reveal" style="font-size: var(--h3-size); color: var(--accent);">// 关键数据展示效果</p>
    </div>
  </section>

  <!-- Slide 3: Content in terminal window -->
  <section class="slide scanlines">
    <div class="slide-content">
      <div class="terminal-window reveal">
        <div class="terminal-titlebar">
          <div class="terminal-dot" style="background: #f85149;"></div>
          <div class="terminal-dot" style="background: #d29922;"></div>
          <div class="terminal-dot" style="background: var(--accent);"></div>
          <span style="margin-left: 8px; font-size: var(--small-size); color: var(--text-secondary);">内容排版预览</span>
        </div>
        <div class="terminal-body">
          <p class="prompt reveal">第一个要点 — 展示<em>强调色</em>效果</p>
          <p class="prompt reveal">第二个要点 — 展示正文字体和行间距</p>
          <p class="prompt reveal">第三个要点 — 展示列表项的前缀装饰<span class="cursor"></span></p>
        </div>
      </div>
    </div>
  </section>

  <!-- Slide 4: Quote -->
  <section class="slide scanlines">
    <div class="slide-content">
      <blockquote class="reveal" style="border-left-color: var(--accent);">"好的设计是尽可能少的设计。"</blockquote>
      <p class="attribution reveal">— Dieter Rams</p>
    </div>
  </section>

  <!-- Slide 5: Two-Column terminal -->
  <section class="slide scanlines">
    <div class="slide-content">
      <h2 class="reveal">对比布局预览</h2>
      <div class="two-cols reveal">
        <div class="terminal-window">
          <div class="terminal-titlebar">
            <div class="terminal-dot" style="background: var(--accent);"></div>
            <span style="margin-left: 8px; font-size: var(--small-size); color: var(--text-secondary);">方案 A</span>
          </div>
          <div class="terminal-body">
            <p class="prompt">优势一</p>
            <p class="prompt">优势二</p>
          </div>
        </div>
        <div class="terminal-window">
          <div class="terminal-titlebar">
            <div class="terminal-dot" style="background: #d29922;"></div>
            <span style="margin-left: 8px; font-size: var(--small-size); color: var(--text-secondary);">方案 B</span>
          </div>
          <div class="terminal-body">
            <p class="prompt">优势一</p>
            <p class="prompt">优势二</p>
          </div>
        </div>
      </div>
    </div>
  </section>

  <script>
    const slides = document.querySelectorAll('.slide');
    let current = 0;
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          entry.target.classList.add('visible');
          current = Array.from(slides).indexOf(entry.target);
          document.querySelector('.progress-bar').style.width = ((current + 1) / slides.length * 100) + '%';
        }
      });
    }, { threshold: 0.5 });
    slides.forEach(s => observer.observe(s));
    let lastScroll = 0;
    const go = (dir) => { current = Math.max(0, Math.min(slides.length - 1, current + dir)); slides[current].scrollIntoView({ behavior: 'smooth' }); };
    document.addEventListener('keydown', (e) => {
      if (['ArrowRight', ' ', 'PageDown'].includes(e.key)) { e.preventDefault(); go(1); }
      if (['ArrowLeft', 'PageUp'].includes(e.key)) { e.preventDefault(); go(-1); }
    });
    document.addEventListener('wheel', (e) => { e.preventDefault(); const now = Date.now(); if (now - lastScroll < 800) return; lastScroll = now; go(e.deltaY > 0 ? 1 : -1); }, { passive: false });
  </script>
</body>
</html>
