<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>风格预览 — Swiss Modern</title>
  <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@800&family=Nunito:wght@400&family=Noto+Sans+SC:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-primary: #ffffff;
      --bg-secondary: #f5f5f5;
      --text-primary: #000000;
      --text-secondary: #555555;
      --accent: #ff3300;
      --accent-glow: rgba(255, 51, 0, 0.2);

      --font-display: "Archivo", "Noto Sans SC", sans-serif;
      --font-body: "Nunito", "Noto Sans SC", sans-serif;

      --title-size: clamp(1.8rem, 6vw, 5rem);
      --h2-size: clamp(1.4rem, 4vw, 3rem);
      --h3-size: clamp(1rem, 2.5vw, 1.75rem);
      --body-size: clamp(0.75rem, 1.5vw, 1.125rem);
      --small-size: clamp(0.65rem, 1vw, 0.875rem);

      --slide-padding: clamp(2rem, 5vw, 6rem);
      --content-gap: clamp(0.5rem, 2vw, 2rem);

      --ease-out-expo: cubic-bezier(0.16, 1, 0.3, 1);
      --duration-normal: 1s;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; overflow-x: hidden; }
    html { scroll-snap-type: y mandatory; scroll-behavior: smooth; }

    body {
      background-color: var(--bg-primary);
      color: var(--text-primary);
      font-family: var(--font-body);
      font-size: var(--body-size);
      line-height: 1.8;
      letter-spacing: 0.03em;
    }

    .slide {
      width: 100vw; height: 100vh; height: 100dvh;
      overflow: hidden; scroll-snap-align: start;
      display: flex; flex-direction: column; position: relative;
    }

    .slide-content {
      flex: 1; display: flex; flex-direction: column;
      justify-content: center; align-items: flex-start; text-align: left;
      max-height: 100%; overflow: hidden; padding: var(--slide-padding);
    }
    .slide-content.center-align { align-items: center; text-align: center; }

    h1 { font-family: var(--font-display); font-size: var(--title-size); font-weight: 800; letter-spacing: -0.02em; line-height: 1.1; text-transform: uppercase; }
    h2 { font-family: var(--font-display); font-size: var(--h2-size); font-weight: 800; letter-spacing: -0.01em; margin-bottom: var(--content-gap); text-transform: uppercase; }
    h3 { font-family: var(--font-display); font-size: var(--h3-size); font-weight: 800; text-transform: uppercase; }
    p  { font-size: var(--body-size); color: var(--text-secondary); line-height: 1.8; max-width: 700px; }
    em { font-style: normal; font-weight: 800; color: var(--accent); }

    /* Calm: gentle fades */
    .reveal {
      opacity: 0; transform: translateY(10px);
      transition: opacity var(--duration-normal) ease-in-out,
                  transform var(--duration-normal) ease-in-out;
    }
    .slide.visible .reveal { opacity: 1; transform: translateY(0); }
    .reveal:nth-child(1) { transition-delay: 0.1s; }
    .reveal:nth-child(2) { transition-delay: 0.25s; }
    .reveal:nth-child(3) { transition-delay: 0.4s; }
    .reveal:nth-child(4) { transition-delay: 0.55s; }

    /* ===== Layout Signature: Visible grid lines + geometric shapes ===== */
    .grid-bg {
      background-image:
        linear-gradient(rgba(0,0,0,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,0,0,0.04) 1px, transparent 1px);
      background-size: 80px 80px;
    }

    .geo-red-bar {
      position: absolute; width: 8px; background: var(--accent);
    }
    .geo-circle {
      position: absolute; border: 3px solid var(--accent);
      border-radius: 50%; opacity: 0.3;
    }

    .big-number {
      font-family: var(--font-display); font-size: clamp(5rem, 18vw, 12rem);
      font-weight: 800; color: var(--accent); line-height: 1;
    }

    blockquote {
      font-size: var(--h3-size); font-style: normal;
      border-left: 6px solid var(--accent);
      padding: 0.5em 1em; text-align: left; max-width: 700px; line-height: 1.6;
      color: var(--text-primary); font-family: var(--font-body);
    }
    .attribution { text-align: left; opacity: 0.5; font-size: var(--small-size); margin-top: 1em; padding-left: 1em; }

    .two-cols { display: flex; gap: clamp(2rem, 4vw, 4rem); width: 100%; max-width: 900px; }
    .two-cols > div { flex: 1; text-align: left; }

    ul { text-align: left; max-width: 700px; list-style: none; }
    ul li { padding: 0.4em 0; border-bottom: 1px solid rgba(0,0,0,0.08); }
    ul li::before { content: ""; display: inline-block; width: 8px; height: 8px; background: var(--accent); margin-right: 0.8em; vertical-align: middle; }

    .progress-bar {
      position: fixed; top: 0; left: 0; height: 4px;
      background: var(--accent);
      width: 0%; z-index: 1000; transition: width 0.3s ease;
    }

    .preview-badge {
      position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%);
      background: var(--accent); color: #fff;
      padding: 0.4rem 1.2rem; border-radius: 0;
      font-size: var(--small-size); font-weight: 800; z-index: 1000;
      opacity: 0.85; pointer-events: none; text-transform: uppercase; letter-spacing: 0.1em;
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.2s !important; }
      html { scroll-behavior: auto; }
    }
  </style>
</head>
<body>

  <div class="progress-bar"></div>
  <div class="preview-badge">Swiss Modern · Preview</div>

  <!-- Slide 1: Cover -->
  <section class="slide grid-bg">
    <div class="geo-red-bar" style="top: 0; left: 15%; height: 40%;"></div>
    <div class="geo-circle" style="bottom: 10%; right: 10%; width: 150px; height: 150px;"></div>
    <div class="slide-content">
      <h1 class="reveal">演示文稿<br>标题</h1>
      <p class="reveal" style="margin-top: 1em;">Clean · Precise · Bauhaus — 瑞士现代主义风格</p>
    </div>
  </section>

  <!-- Slide 2: Stat -->
  <section class="slide grid-bg">
    <div class="geo-red-bar" style="top: 20%; right: 10%; height: 60%;"></div>
    <div class="slide-content center-align">
      <div class="big-number reveal">42%</div>
      <p class="reveal" style="font-size: var(--h3-size);">关键数据展示效果</p>
    </div>
  </section>

  <!-- Slide 3: Content -->
  <section class="slide grid-bg">
    <div class="slide-content">
      <h2 class="reveal">内容排版预览</h2>
      <ul>
        <li class="reveal">第一个要点 — 展示<em>强调色</em>效果</li>
        <li class="reveal">第二个要点 — 展示正文字体和行间距</li>
        <li class="reveal">第三个要点 — 展示列表项的前缀装饰</li>
      </ul>
    </div>
  </section>

  <!-- Slide 4: Quote -->
  <section class="slide" style="background: var(--bg-secondary);">
    <div class="geo-circle" style="top: 15%; left: 8%; width: 100px; height: 100px;"></div>
    <div class="slide-content">
      <blockquote class="reveal">"好的设计是尽可能少的设计。"</blockquote>
      <p class="attribution reveal">— Dieter Rams</p>
    </div>
  </section>

  <!-- Slide 5: Two-Column -->
  <section class="slide grid-bg">
    <div class="slide-content">
      <h2 class="reveal">对比布局预览</h2>
      <div class="two-cols reveal">
        <div style="border-left: 6px solid var(--accent); padding-left: 1.5rem;">
          <h3>方案 A</h3>
          <ul><li>优势一</li><li>优势二</li></ul>
        </div>
        <div style="border-left: 6px solid #ccc; padding-left: 1.5rem;">
          <h3 style="color: var(--text-secondary);">方案 B</h3>
          <ul><li>优势一</li><li>优势二</li></ul>
        </div>
      </div>
    </div>
  </section>

  <script>
    const slides = document.querySelectorAll('.slide');
    let current = 0;
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          entry.target.classList.add('visible');
          current = Array.from(slides).indexOf(entry.target);
          document.querySelector('.progress-bar').style.width = ((current + 1) / slides.length * 100) + '%';
        }
      });
    }, { threshold: 0.5 });
    slides.forEach(s => observer.observe(s));
    let lastScroll = 0;
    const go = (dir) => { current = Math.max(0, Math.min(slides.length - 1, current + dir)); slides[current].scrollIntoView({ behavior: 'smooth' }); };
    document.addEventListener('keydown', (e) => {
      if (['ArrowRight', ' ', 'PageDown'].includes(e.key)) { e.preventDefault(); go(1); }
      if (['ArrowLeft', 'PageUp'].includes(e.key)) { e.preventDefault(); go(-1); }
    });
    document.addEventListener('wheel', (e) => { e.preventDefault(); const now = Date.now(); if (now - lastScroll < 800) return; lastScroll = now; go(e.deltaY > 0 ? 1 : -1); }, { passive: false });
  </script>
</body>
</html>
