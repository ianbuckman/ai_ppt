<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>风格预览 — Neon Cyber</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=JetBrains+Mono:wght@400;700&family=Noto+Sans+SC:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-primary: #0a0f1c;
      --bg-secondary: #111827;
      --text-primary: #ffffff;
      --text-secondary: #8899aa;
      --accent: #00ffcc;
      --accent-magenta: #ff00aa;
      --accent-glow: rgba(0, 255, 204, 0.3);

      --font-display: "Space Grotesk", "Noto Sans SC", sans-serif;
      --font-body: "JetBrains Mono", "Noto Sans SC", monospace;

      --title-size: clamp(1.5rem, 5vw, 4rem);
      --h2-size: clamp(1.25rem, 3.5vw, 2.5rem);
      --h3-size: clamp(1rem, 2.5vw, 1.75rem);
      --body-size: clamp(0.7rem, 1.3vw, 1rem);
      --small-size: clamp(0.6rem, 0.9vw, 0.8rem);

      --slide-padding: clamp(1rem, 4vw, 4rem);
      --content-gap: clamp(0.5rem, 2vw, 2rem);

      --ease-out-expo: cubic-bezier(0.16, 1, 0.3, 1);
      --duration-normal: 0.6s;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; overflow-x: hidden; }
    html { scroll-snap-type: y mandatory; scroll-behavior: smooth; }

    body {
      background-color: var(--bg-primary);
      color: var(--text-primary);
      font-family: var(--font-body);
      font-size: var(--body-size);
      line-height: 1.8;
      letter-spacing: 0.05em;
    }

    .slide {
      width: 100vw; height: 100vh; height: 100dvh;
      overflow: hidden; scroll-snap-align: start;
      display: flex; flex-direction: column; position: relative;
    }

    .slide-content {
      flex: 1; display: flex; flex-direction: column;
      justify-content: center; align-items: center; text-align: center;
      max-height: 100%; overflow: hidden; padding: var(--slide-padding);
      position: relative; z-index: 1;
    }
    .slide-content.left-align { align-items: flex-start; text-align: left; }

    h1 { font-family: var(--font-display); font-size: var(--title-size); font-weight: 700; letter-spacing: 0.08em; line-height: 1.3; }
    h2 { font-family: var(--font-display); font-size: var(--h2-size); font-weight: 700; letter-spacing: 0.08em; margin-bottom: var(--content-gap); }
    h3 { font-family: var(--font-display); font-size: var(--h3-size); font-weight: 500; }
    p  { font-size: var(--body-size); color: var(--text-secondary); line-height: 1.8; max-width: 800px; }
    em { font-style: normal; font-weight: 700; color: var(--accent); }

    /* Techy: glow + grid */
    .neon-glow { text-shadow: 0 0 10px var(--accent), 0 0 40px var(--accent-glow); }
    .magenta-glow { text-shadow: 0 0 10px var(--accent-magenta), 0 0 40px rgba(255, 0, 170, 0.3); }

    .reveal {
      opacity: 0; transform: translateY(30px);
      transition: opacity var(--duration-normal) var(--ease-out-expo),
                  transform var(--duration-normal) var(--ease-out-expo);
    }
    .slide.visible .reveal { opacity: 1; transform: translateY(0); }
    .reveal:nth-child(1) { transition-delay: 0.1s; }
    .reveal:nth-child(2) { transition-delay: 0.2s; }
    .reveal:nth-child(3) { transition-delay: 0.3s; }
    .reveal:nth-child(4) { transition-delay: 0.4s; }

    /* Grid background */
    .bg-grid {
      background-image:
        linear-gradient(rgba(0, 255, 204, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 255, 204, 0.03) 1px, transparent 1px);
      background-size: 50px 50px;
    }

    .big-number {
      font-family: var(--font-display); font-size: clamp(4rem, 15vw, 10rem);
      font-weight: 700; color: var(--accent); line-height: 1;
    }

    blockquote {
      font-size: var(--h3-size); font-style: normal;
      border-left: 3px solid var(--accent);
      padding: 0.5em 1em; text-align: left; max-width: 800px; line-height: 1.8;
      box-shadow: -3px 0 15px var(--accent-glow);
    }
    .attribution { text-align: right; opacity: 0.6; font-size: var(--small-size); margin-top: 1em; }

    .two-cols { display: flex; gap: clamp(1rem, 3vw, 3rem); width: 100%; max-width: 1000px; }
    .two-cols > div { flex: 1; text-align: left; }

    ul { text-align: left; max-width: 800px; list-style: none; }
    ul li { padding: 0.3em 0; }
    ul li::before { content: ">"; color: var(--accent); margin-right: 0.5em; font-family: var(--font-body); }

    /* Neon border card */
    .neon-card {
      border: 1px solid rgba(0, 255, 204, 0.2);
      box-shadow: 0 0 20px rgba(0, 255, 204, 0.1), inset 0 0 20px rgba(0, 255, 204, 0.05);
      border-radius: 8px; padding: 1.5rem; background: rgba(0, 255, 204, 0.03);
    }

    .progress-bar {
      position: fixed; top: 0; left: 0; height: 3px;
      background: linear-gradient(90deg, var(--accent), var(--accent-magenta));
      width: 0%; z-index: 1000; transition: width 0.3s ease;
      box-shadow: 0 0 10px var(--accent-glow);
    }

    .preview-badge {
      position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%);
      background: var(--accent); color: var(--bg-primary);
      padding: 0.4rem 1.2rem; border-radius: 2rem;
      font-size: var(--small-size); font-weight: 700; z-index: 1000;
      opacity: 0.85; pointer-events: none;
      box-shadow: 0 0 15px var(--accent-glow);
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.2s !important; }
      html { scroll-behavior: auto; }
    }
  </style>
</head>
<body>

  <div class="progress-bar"></div>
  <div class="preview-badge">Neon Cyber · 风格预览</div>

  <!-- Slide 1: Cover -->
  <section class="slide bg-grid">
    <div class="slide-content">
      <h1 class="reveal neon-glow">演示文稿标题</h1>
      <p class="reveal">Futuristic · Techy · Confident — 赛博霓虹风格</p>
    </div>
  </section>

  <!-- Slide 2: Stat -->
  <section class="slide bg-grid">
    <div class="slide-content">
      <div class="big-number reveal neon-glow">42%</div>
      <p class="reveal" style="font-size: var(--h3-size);">关键数据展示效果</p>
    </div>
  </section>

  <!-- Slide 3: Content -->
  <section class="slide bg-grid">
    <div class="slide-content left-align">
      <h2 class="reveal" style="color: var(--accent);">内容排版预览</h2>
      <div class="neon-card">
        <ul>
          <li class="reveal">第一个要点 — 展示<em>强调色</em>效果</li>
          <li class="reveal">第二个要点 — 展示正文字体和行间距</li>
          <li class="reveal">第三个要点 — 展示列表项的前缀装饰</li>
        </ul>
      </div>
    </div>
  </section>

  <!-- Slide 4: Quote -->
  <section class="slide bg-grid">
    <div class="slide-content">
      <blockquote class="reveal">"好的设计是尽可能少的设计。"</blockquote>
      <p class="attribution reveal">— Dieter Rams</p>
    </div>
  </section>

  <!-- Slide 5: Two-Column -->
  <section class="slide bg-grid">
    <div class="slide-content">
      <h2 class="reveal">对比布局预览</h2>
      <div class="two-cols reveal">
        <div class="neon-card">
          <h3 style="color: var(--accent);" class="neon-glow">方案 A</h3>
          <ul><li>优势一</li><li>优势二</li></ul>
        </div>
        <div class="neon-card" style="border-color: rgba(255,0,170,0.2); box-shadow: 0 0 20px rgba(255,0,170,0.1);">
          <h3 style="color: var(--accent-magenta);" class="magenta-glow">方案 B</h3>
          <ul><li style="color: var(--text-secondary);">优势一</li><li style="color: var(--text-secondary);">优势二</li></ul>
        </div>
      </div>
    </div>
  </section>

  <script>
    const slides = document.querySelectorAll('.slide');
    let current = 0;
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          entry.target.classList.add('visible');
          current = Array.from(slides).indexOf(entry.target);
          document.querySelector('.progress-bar').style.width = ((current + 1) / slides.length * 100) + '%';
        }
      });
    }, { threshold: 0.5 });
    slides.forEach(s => observer.observe(s));
    let lastScroll = 0;
    const go = (dir) => { current = Math.max(0, Math.min(slides.length - 1, current + dir)); slides[current].scrollIntoView({ behavior: 'smooth' }); };
    document.addEventListener('keydown', (e) => {
      if (['ArrowRight', ' ', 'PageDown'].includes(e.key)) { e.preventDefault(); go(1); }
      if (['ArrowLeft', 'PageUp'].includes(e.key)) { e.preventDefault(); go(-1); }
    });
    document.addEventListener('wheel', (e) => { e.preventDefault(); const now = Date.now(); if (now - lastScroll < 800) return; lastScroll = now; go(e.deltaY > 0 ? 1 : -1); }, { passive: false });
  </script>
</body>
</html>
